name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude pdfplumber-py --exclude pdfplumber-wasm -- -D warnings

  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.85"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}
      - run: cargo check --workspace --exclude pdfplumber-py --exclude pdfplumber-wasm
      - run: cargo test --workspace --exclude pdfplumber-py --exclude pdfplumber-wasm

  test-pyo3:
    name: Test pdfplumber-py (PyO3 unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p pdfplumber-py --lib --features pyo3/auto-initialize

  check-wasm:
    name: Check pdfplumber-wasm (wasm32 target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p pdfplumber-wasm --target wasm32-unknown-unknown

  build-wasm-pack:
    name: wasm-pack build (smoke check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - name: Build WASM (bundler target)
        run: wasm-pack build --target bundler --out-dir pkg crates/pdfplumber-wasm
      - name: Verify pkg output
        run: |
          test -f crates/pdfplumber-wasm/pkg/pdfplumber_wasm.js
          test -f crates/pdfplumber-wasm/pkg/pdfplumber_wasm_bg.wasm

  test-py-integration:
    name: Python integration tests (pdfplumber-py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin + pytest
        run: pip install maturin pytest
      - name: Build and install extension
        run: maturin develop --manifest-path crates/pdfplumber-py/Cargo.toml --features extension-module
      - name: Run pytest integration suite
        run: pytest crates/pdfplumber-py/tests/ -v --tb=short
